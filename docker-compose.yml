services:
  mongodb:
    image: mongo:7.0
    container_name: resume-matching-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-genai_product_discovery}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: resume-matching-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - -advertise-client-urls=http://etcd:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: resume-matching-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["minio", "server", "/minio_data"]
    volumes:
      - minio_data:/minio_data
  milvus:
    image: milvusdb/milvus:v2.4.8
    container_name: resume-matching-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus

  attu:
    image: zilliz/attu:latest
    container_name: resume-matching-attu
    depends_on:
      - milvus
    ports:
      - "3000:3000"


volumes:
  mongo_data:
  etcd_data:
  minio_data:
  milvus_data:
